<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--font-body);color:var(--text-body)}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .sw{display:flex;flex-direction:column;gap:6px;min-width:140px}
  .chip{height:60px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
  .name{font-size:12px;font-weight:700;color:var(--text-primary)}
  .hex{font-size:11px;color:var(--text-muted);font-family:var(--font-mono)}
</style></head><body>
<div class="row">
  <div class="sw">
    <div class="chip" style="background:var(--score-high-soft);color:var(--score-high);border:1px solid rgba(31,122,66,0.2)">High Trust</div>
    <div class="name">score-high</div><div class="hex">#1f7a42 on #ecf8f0</div>
  </div>
  <div class="sw">
    <div class="chip" style="background:var(--score-mid-soft);color:var(--score-mid);border:1px solid rgba(184,97,27,0.2)">Review Carefully</div>
    <div class="name">score-mid</div><div class="hex">#b8611b on #fff3e7</div>
  </div>
  <div class="sw">
    <div class="chip" style="background:var(--score-low-soft);color:var(--score-low);border:1px solid rgba(179,58,58,0.2)">Low Trust</div>
    <div class="name">score-low</div><div class="hex">#b33a3a on #fff0f0</div>
  </div>
</div>
</body></html>
