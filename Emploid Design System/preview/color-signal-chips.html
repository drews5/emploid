<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--font-body)}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .chip{display:inline-flex;align-items:center;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:600;border:1px solid transparent}
  .green{background:var(--green-soft);color:var(--green-text);border-color:var(--green-border)}
  .amber{background:var(--amber-soft);color:var(--amber-text);border-color:var(--amber-border)}
  .red{background:var(--red-soft);color:var(--red-text);border-color:var(--red-border)}
  .gray{background:var(--gray-soft);color:var(--gray-text);border-color:var(--gray-border)}
  .src{font-weight:700;font-size:14px}
  h4{font-family:var(--font-heading);font-size:13px;margin:0 0 8px;color:var(--text-primary);text-transform:uppercase;letter-spacing:0.06em}
  .block{margin-bottom:14px}
</style></head><body>
<div class="block"><h4>Signal chips</h4>
<div class="row">
  <span class="chip green">Direct Company Link</span>
  <span class="chip green">Actively Hiring</span>
  <span class="chip amber">Repost heavy</span>
  <span class="chip red">Ghost risk</span>
  <span class="chip gray">Remote</span>
</div></div>
<div class="block"><h4>Source colors (job boards)</h4>
<div class="row" style="font-family:var(--font-body)">
  <span class="src" style="color:#0a66c2">LinkedIn</span>
  <span class="src" style="color:#2164f3">Indeed</span>
  <span class="src" style="color:#ff7043">Handshake</span>
  <span class="src" style="color:#0caa41">Glassdoor</span>
  <span class="src" style="color:var(--text-muted)">Company Direct</span>
</div></div>
</body></html>
