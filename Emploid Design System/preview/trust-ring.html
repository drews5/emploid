<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg);font-family:var(--font-body)}
  .row{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
  .ring{position:relative;width:72px;height:72px}
  .ring svg{width:100%;height:100%}
  .ring .val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-heading);font-weight:700;font-size:1rem;color:var(--text-primary)}
  .label{font-weight:700;font-size:0.92rem;margin-top:4px}
  .high{color:var(--score-high)}
  .mid{color:var(--score-mid)}
  .low{color:var(--score-low)}
  .item{display:flex;flex-direction:column;align-items:center;gap:4px}
</style></head><body>
<div class="row">
  <div class="item">
    <div class="ring">
      <svg viewBox="0 0 36 36"><circle cx="18" cy="18" r="16" fill="none" stroke="#d7e0ea" stroke-width="3"/><circle cx="18" cy="18" r="16" fill="none" stroke="#1f7a42" stroke-width="3" stroke-dasharray="100.5" stroke-dashoffset="15" transform="rotate(-90 18 18)" stroke-linecap="round"/></svg>
      <div class="val">85</div>
    </div>
    <div class="label high">High Trust</div>
  </div>
  <div class="item">
    <div class="ring">
      <svg viewBox="0 0 36 36"><circle cx="18" cy="18" r="16" fill="none" stroke="#d7e0ea" stroke-width="3"/><circle cx="18" cy="18" r="16" fill="none" stroke="#b8611b" stroke-width="3" stroke-dasharray="100.5" stroke-dashoffset="50" transform="rotate(-90 18 18)" stroke-linecap="round"/></svg>
      <div class="val">52</div>
    </div>
    <div class="label mid">Review Carefully</div>
  </div>
  <div class="item">
    <div class="ring">
      <svg viewBox="0 0 36 36"><circle cx="18" cy="18" r="16" fill="none" stroke="#d7e0ea" stroke-width="3"/><circle cx="18" cy="18" r="16" fill="none" stroke="#b33a3a" stroke-width="3" stroke-dasharray="100.5" stroke-dashoffset="80" transform="rotate(-90 18 18)" stroke-linecap="round"/></svg>
      <div class="val">22</div>
    </div>
    <div class="label low">Low Trust</div>
  </div>
</div>
</body></html>
