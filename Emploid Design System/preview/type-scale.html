<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:#fff;color:var(--text-body)}
  .row{display:grid;grid-template-columns:90px 1fr;gap:8px 18px;align-items:baseline}
  .tag{font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}
  h1{font-family:var(--font-heading);font-weight:900;letter-spacing:-0.04em;line-height:1.04;margin:0;color:var(--text-primary);font-size:38px}
  h2{font-family:var(--font-heading);font-weight:700;letter-spacing:-0.03em;line-height:1.08;margin:0;color:var(--text-primary);font-size:28px}
  h3{font-family:var(--font-heading);font-weight:700;letter-spacing:-0.01em;margin:0;color:var(--text-primary);font-size:18px}
  p{margin:0;font-family:var(--font-body);color:var(--text-body);font-size:16px;line-height:1.6}
  .small{font-size:14px;color:var(--text-muted)}
</style></head><body>
<div class="row">
  <span class="tag">H1 · 900</span><h1>Application Tracker</h1>
  <span class="tag">H2 · 700</span><h2>Where momentum is real.</h2>
  <span class="tag">H3 · 700</span><h3>We scan everything</h3>
  <span class="tag">Body</span><p>Over 40% of online job postings are ghost jobs.</p>
  <span class="tag">Small</span><p class="small">12,000+ listings scanned · 6 boards indexed</p>
</div>
</body></html>
