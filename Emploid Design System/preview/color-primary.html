<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--font-body);color:var(--text-body)}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .sw{display:flex;flex-direction:column;gap:6px;min-width:110px}
  .chip{height:56px;border-radius:12px;border:1px solid rgba(188,201,216,0.5);box-shadow:var(--shadow-sm)}
  .name{font-size:12px;font-weight:700;color:var(--text-primary);font-family:var(--font-body)}
  .hex{font-size:11px;color:var(--text-muted);font-family:var(--font-mono);letter-spacing:0.02em}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--orange-500)"></div><div class="name">orange-500</div><div class="hex">#c85b24 · Primary CTA</div></div>
  <div class="sw"><div class="chip" style="background:var(--orange-600)"></div><div class="name">orange-600</div><div class="hex">#a9491b · Hover</div></div>
  <div class="sw"><div class="chip" style="background:var(--orange-300)"></div><div class="name">orange-300</div><div class="hex">#edb18f · Accent border</div></div>
  <div class="sw"><div class="chip" style="background:var(--orange-soft)"></div><div class="name">orange-soft</div><div class="hex">#fff1e9 · Soft bg</div></div>
  <div class="sw"><div class="chip" style="background:var(--orange-hero)"></div><div class="name">orange-hero</div><div class="hex">#ffbe7f · On-dark accent</div></div>
</div>
</body></html>
