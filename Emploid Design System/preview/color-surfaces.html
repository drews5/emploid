<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--font-body);color:var(--text-body)}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .sw{display:flex;flex-direction:column;gap:6px;min-width:120px}
  .chip{height:56px;border-radius:12px;border:1px solid rgba(188,201,216,0.7)}
  .name{font-size:12px;font-weight:700;color:var(--text-primary)}
  .hex{font-size:11px;color:var(--text-muted);font-family:var(--font-mono)}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--bg)"></div><div class="name">bg</div><div class="hex">#f5f7fb · Page</div></div>
  <div class="sw"><div class="chip" style="background:var(--bg-light)"></div><div class="name">bg-light</div><div class="hex">#edf3fa · Panel</div></div>
  <div class="sw"><div class="chip" style="background:var(--bg-white)"></div><div class="name">bg-white</div><div class="hex">#ffffff · Card</div></div>
  <div class="sw"><div class="chip" style="background:var(--surface)"></div><div class="name">surface</div><div class="hex">#e8eef6</div></div>
  <div class="sw"><div class="chip" style="background:var(--border)"></div><div class="name">border</div><div class="hex">#bcc9d8</div></div>
  <div class="sw"><div class="chip" style="background:var(--border-strong)"></div><div class="name">border-strong</div><div class="hex">#8da0b6</div></div>
</div>
</body></html>
