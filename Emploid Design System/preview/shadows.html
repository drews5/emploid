<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--bg);font-family:var(--font-body)}
  .row{display:flex;gap:24px;align-items:center;flex-wrap:wrap}
  .card{width:140px;height:70px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:12px;color:var(--text-muted);border:1px solid rgba(188,201,216,0.7)}
  .sm{box-shadow:var(--shadow-sm)}
  .md{box-shadow:var(--shadow-md)}
  .lg{box-shadow:var(--shadow-lg)}
  .cta{box-shadow:var(--shadow-cta);background:var(--orange-500);color:#fff}
</style></head><body>
<div class="row">
  <div class="card sm">shadow-sm</div>
  <div class="card md">shadow-md</div>
  <div class="card lg">shadow-lg</div>
  <div class="card cta">shadow-cta</div>
</div>
</body></html>
