<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:16px;background:var(--bg);font-family:var(--font-body)}
  .job{position:relative;padding:20px 24px;border:1px solid rgba(188,201,216,0.9);border-radius:8px;background:#fff;box-shadow:var(--shadow-sm);display:grid;grid-template-columns:1fr 160px;gap:16px;align-items:start}
  .title{font-family:var(--font-heading);font-size:18px;font-weight:700;color:var(--text-primary)}
  .company{margin-top:4px;font-size:14px;color:var(--text-body)}
  .src{font-weight:700;color:#ff7043}
  .meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .pill{display:inline-flex;align-items:center;padding:5px 10px;border-radius:999px;background:var(--bg-light);font-size:12px;color:var(--text-body)}
  .pill.hi{background:#fff1e6;color:var(--orange-600);border:1px solid rgba(200,91,36,0.16)}
  .tags{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
  .chip{padding:5px 10px;border-radius:999px;font-size:12px;font-weight:600;background:#d7f0de;color:#165b2f;border:1px solid #b8dfc5}
  .right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
  .ring{width:32px;height:32px;position:relative}
  .ring svg{width:100%;height:100%}
  .ring .val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-heading);font-weight:700;font-size:10px;color:var(--text-primary)}
  .tg{font-size:12px;font-weight:700;color:var(--score-high)}
  .apply{margin-top:10px;background:var(--orange-500);color:#fff;border:none;border-radius:6px;padding:8px 12px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit}
</style></head><body>
<div class="job">
  <div>
    <div class="title">Software Engineer</div>
    <div class="company">Stripe · Austin, TX · <span class="src" style="color:#0caa41">via Glassdoor</span></div>
    <div class="meta">
      <span class="pill hi">$125k–$165k</span>
      <span class="pill">Hybrid</span>
      <span class="pill">Full-time</span>
    </div>
    <div class="tags">
      <span class="chip">Direct Company Link</span>
      <span class="chip">Actively Hiring</span>
    </div>
  </div>
  <div class="right">
    <div class="ring">
      <svg viewBox="0 0 36 36"><circle cx="18" cy="18" r="16" fill="none" stroke="#d7e0ea" stroke-width="3"/><circle cx="18" cy="18" r="16" fill="none" stroke="#1f7a42" stroke-width="3" stroke-dasharray="100.5" stroke-dashoffset="18" transform="rotate(-90 18 18)" stroke-linecap="round"/></svg>
      <div class="val">82</div>
    </div>
    <div class="tg">High Trust</div>
    <button class="apply">Apply on stripe.com/careers →</button>
  </div>
</div>
</body></html>
