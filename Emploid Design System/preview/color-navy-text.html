<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--font-body);color:var(--text-body)}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .sw{display:flex;flex-direction:column;gap:6px;min-width:110px}
  .chip{height:56px;border-radius:12px;border:1px solid rgba(188,201,216,0.5);box-shadow:var(--shadow-sm)}
  .name{font-size:12px;font-weight:700;color:var(--text-primary)}
  .hex{font-size:11px;color:var(--text-muted);font-family:var(--font-mono)}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--navy-950)"></div><div class="name">navy-950</div><div class="hex">#08111f</div></div>
  <div class="sw"><div class="chip" style="background:var(--navy-900)"></div><div class="name">navy-900</div><div class="hex">#0c1728</div></div>
  <div class="sw"><div class="chip" style="background:var(--navy-800)"></div><div class="name">navy-800</div><div class="hex">#122035</div></div>
  <div class="sw"><div class="chip" style="background:var(--navy-700)"></div><div class="name">navy-700</div><div class="hex">#203149</div></div>
  <div class="sw"><div class="chip" style="background:var(--text-primary)"></div><div class="name">text-primary</div><div class="hex">#0d1726</div></div>
  <div class="sw"><div class="chip" style="background:var(--text-body)"></div><div class="name">text-body</div><div class="hex">#223247</div></div>
  <div class="sw"><div class="chip" style="background:var(--text-muted)"></div><div class="name">text-muted</div><div class="hex">#5d7088</div></div>
</div>
</body></html>
