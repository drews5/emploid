<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg);font-family:var(--font-body)}
  .nav{background:rgba(255,255,255,0.96);border:1px solid rgba(188,201,216,0.6);border-radius:14px;box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:space-between;padding:10px 20px;min-height:66px}
  .logo{display:flex;align-items:center;gap:10px}
  .logo img{width:22px}
  .word{font-family:var(--font-heading);font-weight:900;font-size:1.1rem;color:var(--text-primary);letter-spacing:-0.02em}
  .links{display:flex;gap:4px}
  .a{padding:9px 14px;border-radius:999px;font-size:14px;font-weight:600;color:var(--text-body);cursor:pointer}
  .a.active{background:rgba(200,91,36,0.12);color:var(--text-primary)}
  .auth{display:flex;gap:10px;align-items:center}
  .login{font-size:14px;font-weight:600;color:var(--text-body);padding:9px 14px}
  .ea{background:#fff;border:1px solid rgba(188,201,216,0.85);padding:9px 16px;border-radius:999px;font-weight:700;color:var(--text-primary);font-size:14px}
</style></head><body>
<div class="nav">
  <div class="logo"><img src="../assets/logoicon.svg?v=2" alt=""><span class="word">emploid</span></div>
  <div class="links"><span class="a">Search</span><span class="a">Browse Jobs</span><span class="a active">About</span></div>
  <div class="auth"><span class="login">Log in</span><span class="ea">Early Access</span></div>
</div>
</body></html>
