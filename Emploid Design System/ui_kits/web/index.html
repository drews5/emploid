<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1280" />
  <title>Emploid — UI Kit</title>
  <link rel="icon" href="../../assets/logoicon.svg" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="styles2.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="app"></div>
  <script type="text/babel" src="Primitives.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="Chrome.jsx"></script>
  <script type="text/babel" src="HomePage.jsx"></script>
  <script type="text/babel" src="JobsPage.jsx"></script>
  <script type="text/babel" src="TrackerPage.jsx"></script>
  <script type="text/babel" src="AboutPage.jsx"></script>
  <script type="text/babel">
    const App = () => {
      const [page, setPage] = React.useState(localStorage.getItem('emploid_page') || 'home');
      const go = (p) => { setPage(p); localStorage.setItem('emploid_page', p); window.scrollTo(0, 0); };
      return (
        <div data-screen-label={page === 'home' ? 'Home' : page === 'jobs' ? 'Jobs' : page === 'tracker' ? 'Tracker' : 'About'}>
          <Nav page={page} onNavigate={go} />
          {page === 'home' && <HomePage onNavigate={go} />}
          {page === 'jobs' && <JobsPage onNavigate={go} />}
          {page === 'tracker' && <TrackerPage />}
          {page === 'about' && <AboutPage />}
          <Footer onNavigate={go} />
        </div>
      );
    };
    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
